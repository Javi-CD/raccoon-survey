<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raccoon Survey — Encuesta</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#1e3a5f',
              secondary: '#2d4a73',
              accent: '#00a8e8',
            },
          },
        },
      };
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon2.png') }}" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>

    <style>
      .animate-fadeIn {
        animation: fadeIn 0.45s ease-in-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 relative z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Logo -->
          <div class="flex items-center gap-3">
            <img
              src="{{ url_for('static', filename='img/img2.png') }}"
              alt="Logo Raccoon"
              class="w-8 h-8 rounded-full object-cover"
            />
            <h1 class="text-xl font-bold text-primary">Raccoon Survey</h1>
          </div>

          <!-- Navigation -->
          <nav class="hidden md:flex space-x-8">
            <a href="{{ url_for('dashboard') }}" class="text-gray-600 font-medium transition-colors">Dashboard</a>
            <a href="{{ url_for('encuestas') }}" class="text-blue-900 font-medium border-b-2 border-blue-900">
              Encuestas
            </a>
            <a href="{{ url_for('reportes') }}" class="text-gray-600 font-medium transition-colors">Reportes</a>
            <a href="#" class="text-gray-600 font-medium transition-colors">Configuración</a>
          </nav>
          <!-- User Menu -->
          <div class="flex items-center gap-4">
            <button class="p-2 text-gray-600 transition-colors"></button>
            <button id="userBtn" class="flex items-center gap-2 cursor-pointer">
              <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
                <i class="fas fa-user text-white text-sm"></i>
              </div>
              <span class="text-sm font-medium text-gray-700">Usuario</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Sidebar -->
    <div
      id="sidebar"
      class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 ease-in-out z-50"
    >
      <!-- Header del Sidebar -->
      <div class="p-6 flex flex-col items-center border-b border-gray-200 bg-blue-900">
        <img
          src="{{ url_for('static', filename='img/usuario.png') }}"
          alt="Usuario"
          class="w-16 h-16 rounded-full object-cover mb-3 border-2 border-white"
        />
        <h2 class="text-lg font-bold text-white">"Usuario"</h2>
      </div>

      <!-- Opciones -->
      <nav class="p-6 flex flex-col gap-4">
        <a href="{{ url_for('root') }}" class="text-red-500 hover:text-red-600 font-medium transition-colors">Salir</a>
      </nav>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

    <!-- Script -->
    <script>
      const userBtn = document.getElementById('userBtn');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');

      userBtn.addEventListener('click', () => {
        sidebar.classList.toggle('translate-x-full');
        overlay.classList.toggle('hidden');
      });

      overlay.addEventListener('click', () => {
        sidebar.classList.add('translate-x-full');
        overlay.classList.add('hidden');
      });
    </script>

    <!-- Contenedor de la encuesta -->
    <div class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-lg border border-gray-200 mx-auto mt-10">
      <!-- Barra de progreso -->
      <div class="w-full bg-gray-200 h-2 rounded-full mb-6 overflow-hidden">
        <div id="progressBar" class="h-2 bg-blue-900 transition-all duration-500" style="width: 0%"></div>
      </div>

      <form id="surveyForm" class="space-y-6">
        <!-- Pregunta 1 -->
        <section class="step" data-step="0">
          <h2 class="text-lg font-medium mb-4">1. ¿Cómo calificarías nuestra atención al cliente?</h2>
          <div class="space-y-2">
            <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" name="q1" value="Excelente" class="form-radio text-blue-900" />
              <span class="ml-3">Excelente</span>
            </label>
            <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" name="q1" value="Buena" class="form-radio text-blue-900" />
              <span class="ml-3">Buena</span>
            </label>
            <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" name="q1" value="Regular" class="form-radio text-blue-900" />
              <span class="ml-3">Regular</span>
            </label>
            <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" name="q1" value="Mala" class="form-radio text-blue-900" />
              <span class="ml-3">Mala</span>
            </label>
          </div>

          <div class="flex justify-between mt-6">
            <div></div>
            <button
              type="button"
              class="next-btn bg-blue-900 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-950 transition"
            >
              Siguiente
            </button>
          </div>
        </section>

        <!-- Pregunta 2 -->
        <section class="step hidden" data-step="1">
          <h2 class="text-lg font-medium mb-4">2. ¿Recomendarías nuestros servicios?</h2>
          <div class="space-y-2">
            <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" name="q2" value="Sí" class="form-radio text-blue-900" />
              <span class="ml-3">Sí</span>
            </label>
            <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" name="q2" value="No" class="form-radio text-blue-900" />
              <span class="ml-3">No</span>
            </label>
          </div>

          <div class="flex justify-between mt-6">
            <button
              type="button"
              class="prev-btn bg-gray-200 text-gray-800 px-5 py-2 rounded-lg shadow hover:bg-gray-300 transition"
            >
              Anterior
            </button>
            <button
              type="button"
              class="next-btn bg-blue-900 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-950 transition"
            >
              Siguiente
            </button>
          </div>
        </section>

        <!-- Pregunta 3 -->
        <section class="step hidden" data-step="2">
          <h2 class="text-lg font-medium mb-4">3. ¿Qué mejorarías de nuestro servicio?</h2>
          <textarea
            name="q3"
            class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-900"
            rows="4"
          ></textarea>

          <div class="flex justify-between mt-6">
            <button
              type="button"
              class="prev-btn bg-gray-200 text-gray-800 px-5 py-2 rounded-lg shadow hover:bg-gray-300 transition"
            >
              Anterior
            </button>
            <button
              type="submit"
              class="bg-green-600 text-white px-6 py-2 rounded-lg shadow hover:bg-green-700 transition"
            >
              Enviar
            </button>
          </div>
        </section>
      </form>
    </div>

    <script>
      // ELEMENTOS
      const steps = Array.from(document.querySelectorAll('.step'));
      const nextBtns = Array.from(document.querySelectorAll('.next-btn'));
      const prevBtns = Array.from(document.querySelectorAll('.prev-btn'));
      const progressBar = document.getElementById('progressBar');
      const form = document.getElementById('surveyForm');
      let current = 0;

      // MUESTRA paso index
      function showStep(index) {
        steps.forEach((s, i) => {
          s.classList.toggle('hidden', i !== index);
          if (i === index) {
            s.classList.add('animate-fadeIn');
            // quitar la clase tras la animación para que pueda reproducirse luego
            setTimeout(() => s.classList.remove('animate-fadeIn'), 500);
          }
        });
        // actualizar barra
        const pct = Math.round(((index + 1) / steps.length) * 100);
        progressBar.style.width = `${pct}%`;
      }

      // EVENTOS bien atados a cada botón
      nextBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (current < steps.length - 1) {
            current++;
            showStep(current);
          }
        });
      });

      prevBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (current > 0) {
            current--;
            showStep(current);
          }
        });
      });

      // submit: demostración (evitar recarga y mostrar agradecimiento simple)
      form.addEventListener('submit', e => {
        e.preventDefault();
        document.querySelector('.w-full.max-w-2xl').innerHTML = `
          <div class="text-center py-12">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4">¡Gracias por tu respuesta!</h2>
            <p class="text-gray-600">Hemos recibido tus respuestas correctamente.</p>
          </div>
        `;
      });

      // Inicializa
      showStep(current);
    </script>
  </body>
</html>
