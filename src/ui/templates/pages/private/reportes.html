<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuestas - Raccoon Survey</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#1e3a5f',
              secondary: '#2d4a73',
              accent: '#00a8e8',
            },
          },
        },
      };
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon2.png') }}" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200 relative z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <img
            src="{{ url_for('static', filename='img/img2.png') }}"
            alt="Logo Raccoon"
            class="w-8 h-8 rounded-full object-cover"
          />
          <h1 class="text-xl font-bold text-primary">Raccoon Survey</h1>
        </div>

        <!-- Navigation -->
        <nav class="hidden md:flex space-x-8">
          <a href="{{ url_for('dashboard') }}" class="text-gray-600 font-medium transition-colors">Dashboard</a>
          <a href="{{ url_for('encuestas') }}" class="text-primary font-medium border-b-2 border-primary">Encuestas</a>
          <a href="{{ url_for('reportes') }}" class="text-gray-600 font-medium transition-colors">Reportes</a>
          <a href="#" class="text-gray-600 font-medium transition-colors">Configuración</a>
        </nav>

        <!-- User Menu -->
        <div class="flex items-center gap-4">
          <button class="p-2 text-gray-600 transition-colors"></button>
          <button id="userBtn" class="flex items-center gap-2 cursor-pointer">
            <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
              <i class="fas fa-user text-white text-sm"></i>
            </div>
            <span class="text-sm font-medium text-gray-700">Usuario</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <div
    id="sidebar"
    class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 ease-in-out z-50"
  >
    <!-- Header del Sidebar -->
    <div class="p-6 flex flex-col items-center border-b border-gray-200 bg-blue-900">
      <img
        src="{{ url_for('static', filename='img/usuario.png') }}"
        alt="Usuario"
        class="w-16 h-16 rounded-full object-cover mb-3 border-2 border-white"
      />
      <h2 class="text-lg font-bold text-white">"Usuario"</h2>
    </div>

    <!-- Opciones -->
    <nav class="p-6 flex flex-col gap-4">
      <a href="#" class="text-gray-700 hover:text-gray-900 font-medium transition-colors">Perfil</a>
      <a href="#" class="text-gray-700 hover:text-gray-900 font-medium transition-colors">Ajustes</a>
      <a href="{{ url_for('root') }}" class="text-red-500 hover:text-red-600 font-medium transition-colors">Salir</a>
    </nav>
  </div>

  <!-- Overlay -->
  <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

  <!-- Script -->
  <script>
    const userBtn = document.getElementById('userBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    userBtn.addEventListener('click', () => {
      sidebar.classList.toggle('translate-x-full');
      overlay.classList.toggle('hidden');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.add('translate-x-full');
      overlay.classList.add('hidden');
    });
  </script>

  <!-- reportes.html -->
  <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6 mt-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Enviar Reporte</h2>

    <form>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Asunto</label>
        <input
          type="text"
          name="asunto"
          class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-primary focus:border-primary"
          placeholder="Ej. Error en encuesta"
          required
        />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Descripción</label>
        <textarea
          name="descripcion"
          class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-primary focus:border-primary"
          rows="4"
          placeholder="Describe el problema o sugerencia"
          required
        ></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Adjuntar archivo o imagen</label>
        <input
          type="file"
          name="archivo"
          class="mt-1 block w-full text-sm text-gray-600 border border-gray-300 rounded-lg px-3 py-2 cursor-pointer focus:ring-primary focus:border-primary"
          accept="image/*,.pdf,.doc,.docx"
        />
      </div>

      <div class="flex justify-end gap-3 border-t pt-4">
        <a
          href="{{ url_for('encuestas') }}"
          class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50"
        >
          Cancelar
        </a>
        <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-secondary">
          Enviar Reporte
        </button>
      </div>
    </form>
  </div>
  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center gap-3 mb-4 md:mb-0">
          <img
            src="{{ url_for('static', filename='img/img2.png') }}"
            alt="Logo Raccoon"
            class="w-6 h-6 rounded-full object-cover"
          />
          <span class="text-lg font-bold text-primary">Raccoon Survey</span>
        </div>

        <div class="flex gap-6 text-sm text-gray-600">
          <a href="#" class="transition-colors">Ayuda</a>
          <a href="#" class="transition-colors">Soporte</a>
          <a href="#" class="transition-colors">Política de Privacidad</a>
        </div>
      </div>
    </div>
  </footer>
</html>
