<div
  id="sidebar"
  class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 ease-in-out z-50"
>
  <!-- Header -->
  <div class="p-6 flex flex-col items-center border-b border-gray-200 bg-blue-900">
    <img
      src="{{ url_for('ui.static', filename='img/resources/userIcon.png') }}"
      alt="Usuario"
      class="w-16 h-16 rounded-full object-cover mb-3 border-2 border-white"
    />
    <h2 class="text-lg font-bold text-white"><span id="sidebarUserName">Usuario</span></h2>
  </div>

  <!-- Options -->
  <nav class="p-6 flex flex-col gap-4">
    <!-- Navigate (Mobile) -->
    <a
      href="{{ url_for('ui.dashboard_page') }}"
      class="font-medium transition-colors {% if nav_active == 'dashboard' %}text-primary{% else %}text-gray-700 hover:text-primary{% endif %}"
    >
      Dashboard
    </a>
    <a
      href="{{ url_for('ui.surveys_page') }}"
      class="font-medium transition-colors {% if nav_active == 'surveys' %}text-primary{% else %}text-gray-700 hover:text-primary{% endif %}"
    >
      Encuestas
    </a>
    <a
      href="{{ url_for('ui.reports_page') }}"
      class="font-medium transition-colors {% if nav_active == 'reports' %}text-primary{% else %}text-gray-700 hover:text-primary{% endif %}"
    >
      Reportes
    </a>
    <a
      href="{{ url_for('ui.config_page') }}"
      id="nav-config"
      data-nav="config"
      style="display: none"
      class="font-medium transition-colors {% if nav_active == 'config' %}text-primary{% else %}text-gray-700 hover:text-primary{% endif %}"
    >
      Configuración
    </a>

    <div class="border-t border-gray-200"></div>
    <a
      href="{{ url_for('ui.home') }}"
      id="logout-link"
      class="text-red-500 hover:text-red-600 font-medium transition-colors"
    >
      Salir
    </a>
  </nav>
</div>

<!-- Overlay -->
<div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>
