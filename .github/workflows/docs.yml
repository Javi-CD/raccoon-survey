name: Docs to GitHub Pages

on:
  push:
    branches: [ "develop", "features", "features/**" ]
  pull_request:
    branches: [ "develop", "features", "features/**" ]
    types: [ opened, synchronize, reopened, closed ]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx HTML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme sphinxcontrib-openapi

      - name: Build docs (Sphinx)
        run: |
          sphinx-build -b html -a -E docs/source docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to use OIDC for authentication
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Deploy on push to allowed branches, or when a PR to allowed branches is merged
    if: >-
      (
        github.event_name == 'push' && (
          github.ref == 'refs/heads/develop' ||
          github.ref == 'refs/heads/features' ||
          startsWith(github.ref, 'refs/heads/features/')
        )
      ) || (
        github.event_name == 'pull_request' && 
        github.event.pull_request.merged == true && (
          github.event.pull_request.base.ref == 'develop' ||
          github.event.pull_request.base.ref == 'features' ||
          startsWith(github.event.pull_request.base.ref, 'features/')
        )
      )
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4