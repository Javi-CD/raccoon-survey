name: Docs

on:
  push:
    branches:
      - develop
      - features
      - 'features/**'
  pull_request:
    branches:
      - develop
      - features
      - 'features/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install doc dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme sphinxcontrib-openapi

      - name: Build backend docs
        run: |
          sphinx-build -b html -a -E docs/source docs/_build/html

      - name: Build UI docs
        run: |
          sphinx-build -b html -a -E -c docs/source src/ui/docs/source docs/_build/html/ui

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/features/') || github.ref == 'refs/heads/features')) ||
      (github.event_name == 'pull_request' && (github.event.pull_request.merged == true) && (github.event.pull_request.base.ref == 'develop' || startsWith(github.event.pull_request.base.ref, 'features/') || github.event.pull_request.base.ref == 'features')) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4